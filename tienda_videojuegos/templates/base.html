{% load static %}

<!-- contacto.html-->
 <!DOCTYPE html>
 <html lang="es" data-bs-theme="dark">
 <head>
     <meta charset="UTF-8">
     <title>{% block title %}Tienda de videojuegos{% endblock %}</title>
     
     <link rel="stylesheet" href="{% static 'css/styles.css' %}">
     <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

     <script src="{% static 'js/script.js' %}"></script>
     
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" 
     integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
 </head>
 <body class="bg-body text-body">

    <header class="d-flex justify-content-between align-items-center p-3 border-bottom">
        <button id="toggle-theme" 
                class="btn btn-outline-secondary rounded-circle shadow-sm d-flex align-items-center justify-content-center" 
                style="width: 45px; height: 45px; transition: all 0.3s ease;">
            <i class="fa-solid fa-circle-half-stroke"></i>
        </button>
    </header>

    {% block content %}
    {% endblock %}

     <footer class="text-center mt-5 mb-3">
        <br>
        <p>&copy; 2026 Tienda de Videojuegos. Todos los derechos reservados.</p>
        <a href="{% url 'home' %}" class="text-body">Inicio</a>
        <a href="{% url 'contacto' %}" class="text-body ms-3">Contacto</a>
     </footer>
 </body>
 </html>
